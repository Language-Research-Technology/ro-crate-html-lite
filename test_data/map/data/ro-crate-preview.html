<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RO-Crate Map</title>
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css"
      rel="stylesheet"

    <style>
      :root {
        color-scheme: light;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background: #f4f6f8;
      }

      .page {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }

      .header {
        padding: 0.8rem 1rem;
        background: #0f172a;
        color: #ffffff;
        border-bottom: 1px solid #1e293b;
      }

      .header h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .content {
        position: relative;
      }

      #map {
        position: absolute;
        inset: 0;
      }

      .status {
        position: absolute;
        top: 1rem;
        left: 1rem;
        z-index: 2;
        background: rgba(15, 23, 42, 0.9);
        color: #fff;
        padding: 0.5rem 0.75rem;
        border-radius: 0.4rem;
        font-size: 0.9rem;
      }

      .status.error {
        background: rgba(153, 27, 27, 0.95);
      }

      .layer-toggles {
        position: absolute;
        top: 1rem;
        right: 3.5rem;
        z-index: 2;
        display: flex;
        gap: 0.4rem;
      }

      .layer-toggles button {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.7rem;
        border: 2px solid transparent;
        border-radius: 0.35rem;
        background: rgba(15, 23, 42, 0.85);
        color: #fff;
        font-size: 0.82rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      }

      .layer-toggles button .swatch {
        display: inline-block;
        width: 0.7rem;
        height: 0.7rem;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .layer-toggles button:hover {
        background: rgba(30, 41, 59, 0.95);
      }

      .layer-toggles button.off {
        opacity: 0.45;
      }

      .mapboxgl-popup-content ul.point-list {
        margin: 0;
        padding: 0 0 0 1.1rem;
        list-style: disc;
      }

      .mapboxgl-popup-content ul.point-list li {
        margin: 0.2rem 0;
        font-size: 0.85rem;
      }

      .debug-dump {
        position: absolute;
        right: 1rem;
        bottom: 1rem;
        z-index: 2;
        width: min(42rem, calc(100vw - 2rem));
        max-height: 40vh;
        overflow: auto;
        margin: 0;
        padding: 0.75rem;
        border-radius: 0.4rem;
        background: rgba(15, 23, 42, 0.9);
        color: #e2e8f0;
        font-size: 0.75rem;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>





    

    <main class="page">
      <header class="header-row">
        <h1 class="page-title">
            
            dingo lingo
            
        </h1>
      </header>
      <section class="content">
        <div id="map" aria-label="Map of RO-Crate objects"></div>
        <div id="status" class="status">Loading RO-Crate metadata...</div>
        <div class="layer-toggles" id="layer-toggles" hidden>
          <button type="button" data-layer="layer-dingo" style="--c:#f59e0b">
            <span class="swatch" style="background:#f59e0b"></span>dingo
          </button>
          <button type="button" data-layer="layer-dog" style="--c:#22c55e">
            <span class="swatch" style="background:#22c55e"></span>dog
          </button>
          <button type="button" data-layer="layer-other" style="--c:#0ea5e9">
            <span class="swatch" style="background:#0ea5e9"></span>other
          </button>
        </div>
        <pre id="features-dump" class="debug-dump" hidden></pre>
      </section>

      function wktToGeoJSON(wkt) {
        if (!wkt || typeof wkt !== "string" || !window.wellknown || typeof window.wellknown.parse !== "function") {
          return null;
        }

        try {
          return window.wellknown.parse(wkt);
        } catch (_err) {
          return null;
        }
      }

      if (!mapToken) {
        statusEl.textContent = "Missing mapboxToken in config";
        statusEl.classList.add("error");
      } else {
        mapboxgl.accessToken = mapToken;

        const featuresByGloss = { dingo: [], dog: [], other: [] };

        mapItems.forEach((item) => {
          const geometry = wktToGeoJSON(item.wkt);
          if (!geometry || geometry.type !== "Point" || !Array.isArray(geometry.coordinates)) {
            return;
          }
          const feature = {
            type: "Feature",
            properties: { name: item.name, gloss: item.gloss },
            geometry,
          };
          const key = item.gloss === "dingo" ? "dingo" : item.gloss === "dog" ? "dog" : "other";
          featuresByGloss[key].push(feature);
        });

        const allFeatures = [...featuresByGloss.dingo, ...featuresByGloss.dog, ...featuresByGloss.other];

        const map = new mapboxgl.Map({
          container: "map",
          style: "mapbox://styles/mapbox/streets-v12",
          center: [133.7751, -25.2744],
          zoom: 3,
        });


        // Safe mapItems dump for debugging: use textContent to avoid HTML injection.
        featuresDumpEl.textContent = JSON.stringify(
            {
            featuresByGloss,
            },
            null,
            2
        );
        featuresDumpEl.hidden = false;

        
        
        map.addControl(new mapboxgl.NavigationControl(), "top-right");

        map.on("load", () => {
          const layers = [
            { id: "layer-dingo", key: "dingo", color: "#f59e0b", stroke: "#78350f" },
            { id: "layer-dog",   key: "dog",   color: "#22c55e", stroke: "#14532d" },
            { id: "layer-other", key: "other", color: "#0ea5e9", stroke: "#075985" },
          ];

          layers.forEach(({ id, key, color, stroke }) => {
            map.addSource(id, {
              type: "geojson",
              data: { type: "FeatureCollection", features: featuresByGloss[key] },
            });
            map.addLayer({
              id,
              type: "circle",
              source: id,
              paint: {
                "circle-radius": 6,
                "circle-color": color,
                "circle-stroke-color": stroke,
                "circle-stroke-width": 1,
              },
            });
          });

          const layerIds = layers.map((l) => l.id);

          map.on("click", layerIds, (e) => {
            const coordinates = e.features[0].geometry.coordinates.slice();

            // Collect all features rendered at this point across all layers, deduplicated by name.
            const allRendered = map.queryRenderedFeatures(e.point, { layers: layerIds });
            const seen = new Set();
            const unique = allRendered.filter((f) => {
              if (seen.has(f.properties.name)) return false;
              seen.add(f.properties.name);
              return true;
            });

            const items = unique.map((f) => {
              const { name, gloss } = f.properties;
              // Escape text to avoid HTML injection.
              const escape = (s) =>
                String(s ?? "")
                  .replace(/&/g, "&amp;")
                  .replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;");
              return gloss
                ? `<li><strong>${escape(name)}</strong> — ${escape(gloss)}</li>`
                : `<li><strong>${escape(name)}</strong></li>`;
            });

            const html =
              items.length === 1
                ? items[0].replace(/^<li>(.*)<\/li>$/, "$1")
                : `<ul class="point-list">${items.join("")}</ul>`;

            new mapboxgl.Popup()
              .setLngLat(coordinates)
              .setHTML(html)
              .addTo(map);
          });

          map.on("mouseenter", layerIds, () => {
            map.getCanvas().style.cursor = "pointer";
          });

          map.on("mouseleave", layerIds, () => {
            map.getCanvas().style.cursor = "";
          });

          if (allFeatures.length > 0) {
            const bounds = new mapboxgl.LngLatBounds();
            allFeatures.forEach((feature) => bounds.extend(feature.geometry.coordinates));
            map.fitBounds(bounds, { padding: 40, maxZoom: 13 });
            statusEl.textContent = `Loaded ${allFeatures.length} mapped objects`;

            const togglesEl = document.getElementById("layer-toggles");
            togglesEl.hidden = false;

            togglesEl.addEventListener("click", (e) => {
              const btn = e.target.closest("button[data-layer]");
              if (!btn) return;
              const layerId = btn.dataset.layer;
              const visible = map.getLayoutProperty(layerId, "visibility") !== "none";
              map.setLayoutProperty(layerId, "visibility", visible ? "none" : "visible");
              btn.classList.toggle("off", visible);
            });
          } else {
            statusEl.textContent = "No valid WKT points found in RepositoryObject entries";
            statusEl.classList.add("error");
          }
        });

        map.on("error", (event) => {
          statusEl.textContent = `Map error: ${event?.error?.message || "unknown"}`;
          statusEl.classList.add("error");
        });
      }
